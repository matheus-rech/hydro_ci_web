name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site files
        run: |
          mkdir -p _site
          find . -maxdepth 1 -type f \
            \( -name '*.html' -o -name '*.css' -o -name '*.js' -o -name '*.json' -o \
               -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.gif' -o \
               -name '*.svg' -o -name '*.ico' -o -name '*.webp' -o -name '*.map' -o \
               -name '*.txt' -o -name '*.xml' -o -name '*.woff' -o -name '*.woff2' \) \
            -exec cp {} _site/ \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
